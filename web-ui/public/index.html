<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autobuild Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Autobuild Manager</h1>
        <div class="form-group">
            <label for="fqdn">FQDN:</label>
            <input type="text" id="fqdn" placeholder="e.g. node1.example.com">
        </div>
        <div class="form-group">
            <label for="role">ROLE:</label>
            <select id="role">
                <option value="general">general</option>
                <option value="ansible">ansible</option>
                <option value="apache">apache</option>
                <option value="docker">docker</option>
                <option value="dockldap">dockldap</option>
                <option value="gitlab">gitlab</option>
                <option value="gitolite">gitolite</option>
                <option value="gitserver">gitserver</option>
                <option value="gluster">gluster</option>
                <option value="jenkins">jenkins</option>
                <option value="qemu">qemu</option>
            </select>
        </div>
        <div class="form-group">
            <label for="ram">RAM (MB):</label>
            <input type="number" id="ram" placeholder="e.g. 2048" value="2048">
        </div>
        <div class="form-group">
            <label for="ncpu">NCPU:</label>
            <input type="number" id="ncpu" placeholder="e.g. 2" value="2">
        </div>
        <div class="button-group">
            <button id="nodeBtn" class="btn btn-primary">Create Node</button>
            <button id="deleteBtn" class="btn btn-danger">Delete Node</button>
        </div>
        <div id="status" class="status"></div>
        <pre id="output" class="output"></pre>
    </div>
    <script src="script.js"></script>
</body>
</html>
